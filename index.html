<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Joseph Roofing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Montserrat',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}
a{
text-decoration:none;
color:white;
}
.hero{
position:relative;
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('truck-wrap.jpg') center center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:flex-start;
}
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:28px 60px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
position:sticky;
top:0;
z-index:100;
}
.logo{
font-size:2rem;
font-weight:800;
letter-spacing:1px;
}
.logo span{
color:#d4af37;
}
.nav-right{
display:flex;
gap:25px;
align-items:center;
}
.phone{
font-weight:700;
}
.btn{
background:#d4af37;
padding:14px 26px;
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>St. Joseph Roofing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #050505;
    color: white;
}

.hero {
    min-height: 100vh;
    background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url('truck-wrap.jpg');
    background-size: cover;
    background-position: center;
    position: relative;
}

.navbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 50px;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 10;
}

.logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 1px;
}

.logo span {
    color: #d4af37;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 30px;
}

.phone {
    font-weight: 700;
    font-size: 1.1rem;
}

.button {
    background: #d4af37;
    color: black;
    padding: 14px 28px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 800;
}

.hero-content {
    position: absolute;
    bottom: 90px;
</html>
